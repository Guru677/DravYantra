name: drav_yantra_app
description: DravYantra Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  fl_chart: ^0.68.0
  lucide_icons: ^0.257.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  http: ^1.2.1
  video_player: ^2.8.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/DY_Logo.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
